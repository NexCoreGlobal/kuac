<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KUAC 비자 발급 성공 사례</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#0d1b2e;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:40px 20px 60px;
  font-family:'Segoe UI',sans-serif;
}
h1{
  color:#fff;
  font-size:20px;
  font-weight:600;
  margin-bottom:6px;
  text-align:center;
  letter-spacing:0.5px;
}
.subtitle{
  color:#7090b0;
  font-size:13px;
  margin-bottom:40px;
  text-align:center;
}
.badge{
  display:inline-block;
  background:#1a6e3a;
  color:#7ef0a0;
  font-size:11px;
  font-weight:600;
  padding:3px 10px;
  border-radius:20px;
  margin-bottom:32px;
  letter-spacing:0.5px;
}
.stage{
  display:flex;
  flex-wrap:wrap;
  gap:32px;
  justify-content:center;
  align-items:flex-end;
  width:100%;
  max-width:1100px;
  perspective:1400px;
}
.card-wrap{
  width:180px;
  cursor:pointer;
  animation:bounce var(--dur) ease-in-out infinite;
  animation-delay:var(--delay);
  transform-style:preserve-3d;
  position:relative;
}
.card-wrap:hover{
  animation-play-state:paused;
  transform:translateY(-24px) rotateY(-10deg) rotateX(5deg) scale(1.12) !important;
  z-index:20;
  transition:transform 0.25s ease;
}
@keyframes bounce{
  0%,100%{transform:translateY(0px) rotateY(-4deg) rotateX(2deg)}
  35%{transform:translateY(-26px) rotateY(4deg) rotateX(-3deg)}
  65%{transform:translateY(-10px) rotateY(-2deg) rotateX(1deg)}
}
.card{
  width:100%;
  border-radius:8px;
  overflow:hidden;
  border:1px solid rgba(100,160,255,0.25);
  box-shadow:
    0 10px 30px rgba(0,0,0,0.45),
    0 2px 8px rgba(0,0,0,0.3),
    inset 0 1px 0 rgba(255,255,255,0.08);
  position:relative;
}
.card img{
  width:100%;
  display:block;
  border-radius:7px;
}
.card::after{
  content:'';
  position:absolute;
  inset:0;
  border-radius:7px;
  background:linear-gradient(135deg,rgba(255,255,255,0.06) 0%,transparent 50%,rgba(0,0,0,0.08) 100%);
  pointer-events:none;
}
.approved-stamp{
  position:absolute;
  top:8px;
  right:8px;
  background:rgba(20,160,70,0.92);
  color:#fff;
  font-size:7px;
  font-weight:700;
  padding:3px 6px;
  border-radius:4px;
  letter-spacing:0.5px;
  border:1px solid rgba(255,255,255,0.3);
}
.shadow{
  width:70%;
  height:8px;
  background:rgba(0,0,50,0.5);
  border-radius:50%;
  margin:0 auto;
  filter:blur(6px);
  animation:shadow-anim var(--dur) ease-in-out infinite;
  animation-delay:var(--delay);
}
@keyframes shadow-anim{
  0%,100%{transform:scaleX(1);opacity:0.5}
  35%{transform:scaleX(0.65);opacity:0.15}
  65%{transform:scaleX(0.82);opacity:0.3}
}
</style>
</head>
