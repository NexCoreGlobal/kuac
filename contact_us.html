<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Contact Us – KUAC Vietnam HQ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Noto Sans KR',sans-serif;
  background:#f5f7fa;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:48px 16px;
}

.container{
  width:100%;
  max-width:1160px;
  background:#fff;
  border-radius:24px;
  box-shadow:0 8px 48px rgba(15,31,61,0.10);
  overflow:hidden;
  display:grid;
  grid-template-columns:1fr 1fr;
  min-height:620px;
}

/* 왼쪽 지도 영역 */
.map-side{
  position:relative;
  background:#e8edf2;
  display:flex;
  flex-direction:column;
}
.map-frame{
  flex:1;
  width:100%;
  border:none;
  display:block;
  min-height:380px;
}
.map-info{
  background:linear-gradient(135deg,#0a2a5e,#1565c0);
  padding:28px 32px;
  color:#fff;
}
.map-info-title{
  font-family:'Montserrat',sans-serif;
  font-size:13px;
  font-weight:700;
  letter-spacing:2px;
  color:#90caf9;
  margin-bottom:20px;
  text-transform:uppercase;
}
.info-row{
  display:flex;
  align-items:flex-start;
  gap:14px;
  margin-bottom:16px;
}
.info-row:last-child{margin-bottom:0}
.info-icon{
  width:36px;height:36px;
  border-radius:10px;
  background:rgba(255,255,255,0.12);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.info-icon svg{width:18px;height:18px;fill:none;stroke:#90caf9;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.info-text{
  display:flex;flex-direction:column;gap:2px;
}
.info-label{
  font-size:10px;font-weight:500;
  color:rgba(255,255,255,0.5);
  letter-spacing:1px;text-transform:uppercase;
}
.info-val{
  font-size:14px;font-weight:500;
  color:#fff;line-height:1.5;
}
.info-val a{color:#90caf9;text-decoration:none}
.info-val a:hover{text-decoration:underline}

/* 오른쪽 폼 영역 */
.form-side{
  padding:52px 48px;
  display:flex;
  flex-direction:column;
}
.form-head{
  margin-bottom:36px;
}
.form-eyebrow{
  font-family:'Montserrat',sans-serif;
  font-size:11px;font-weight:700;
  letter-spacing:3px;color:#1565c0;
  text-transform:uppercase;
  display:flex;align-items:center;gap:8px;
  margin-bottom:10px;
}
.form-eyebrow::before{
  content:'';display:inline-block;
  width:22px;height:2px;background:#1565c0;border-radius:2px;
}
.form-title{
  font-family:'Montserrat',sans-serif;
  font-size:30px;font-weight:800;
  color:#0f1f3d;letter-spacing:-0.5px;
  margin-bottom:8px;
}
.form-sub{
  font-size:14px;color:#64748b;font-weight:400;
}

form{flex:1;display:flex;flex-direction:column;gap:20px}

.row{display:grid;grid-template-columns:1fr 1fr;gap:16px}

.field{display:flex;flex-direction:column;gap:6px}
.field label{
  font-size:13px;font-weight:500;color:#374151;
  display:flex;align-items:center;gap:4px;
}
.field label .req{color:#e53935;font-size:12px}
.field input,
.field textarea{
  width:100%;
  padding:12px 16px;
  border:1.5px solid #e2e8f0;
  border-radius:10px;
  font-size:14px;
  font-family:'Noto Sans KR',sans-serif;
  color:#1e293b;
  background:#f8fafc;
  transition:border-color .2s, box-shadow .2s, background .2s;
  outline:none;
  resize:none;
}
.field input:focus,
.field textarea:focus{
  border-color:#1565c0;
  background:#fff;
  box-shadow:0 0 0 3px rgba(21,101,192,0.10);
}
.field input::placeholder,
.field textarea::placeholder{color:#94a3b8}
.field textarea{height:130px}

.submit-btn{
  background:linear-gradient(135deg,#1565c0,#0a2a5e);
  color:#fff;
  border:none;
  border-radius:12px;
  padding:15px 32px;
  font-size:15px;font-weight:700;
  font-family:'Montserrat',sans-serif;
  letter-spacing:0.5px;
  cursor:pointer;
  transition:transform .2s, box-shadow .2s, opacity .2s;
  display:flex;align-items:center;justify-content:center;gap:10px;
  box-shadow:0 4px 16px rgba(21,101,192,0.30);
}
.submit-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(21,101,192,0.40)}
.submit-btn:active{transform:translateY(0);box-shadow:0 2px 8px rgba(21,101,192,0.20)}
.submit-btn svg{width:18px;height:18px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* 알림 메시지 */
.msg{
  display:none;
  padding:14px 18px;
  border-radius:10px;
  font-size:13px;font-weight:500;
  align-items:center;gap:10px;
  margin-top:4px;
}
.msg.success{
  background:#e8f5e9;color:#1b5e20;
  border:1px solid #a5d6a7;
  display:flex;
}
.msg.error{
  background:#fce4ec;color:#880e4f;
  border:1px solid #f48fb1;
  display:flex;
}
.msg svg{width:18px;height:18px;flex-shrink:0}

/* 로딩 스피너 */
.spinner{
  width:18px;height:18px;
  border:2.5px solid rgba(255,255,255,0.4);
  border-top-color:#fff;
  border-radius:50%;
  animation:spin .7s linear infinite;
  display:none;
}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:820px){
  .container{grid-template-columns:1fr}
  .form-side{padding:36px 28px}
}
@media(max-width:480px){
  .row{grid-template-columns:1fr}
  .form-title{font-size:24px}
}
</style>
</head>
<body>

<div class="container">

  <!-- 왼쪽: 지도 + 연락처 -->
  <div class="map-side">
    <iframe
      class="map-frame"
      src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3724.0968!2d105.7831!3d21.0285!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3135ab5a3c5b6b5f%3A0x0!2s242-12+My+Dinh+Song+Da%2C+Nam+Tu+Liem%2C+Hanoi%2C+Vietnam!5e0!3m2!1sko!2skr!4v1"
      allowfullscreen=""
      loading="lazy"
      referrerpolicy="no-referrer-when-downgrade">
    </iframe>

    <div class="map-info">
      <div class="map-info-title">Contact Information</div>

      <div class="info-row">
        <div class="info-icon">
          <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        </div>
        <div class="info-text">
          <span class="info-label">Location</span>
          <span class="info-val">242-12 My Dinh Song Da, Nam Tu Liem<br>Hanoi, Vietnam</span>
        </div>
      </div>

      <div class="info-row">
        <div class="info-icon">
          <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        </div>
        <div class="info-text">
          <span class="info-label">Email</span>
          <span class="info-val"><a href="mailto:huh0303@gmail.com">huh0303@gmail.com</a></span>
        </div>
      </div>

      <div class="info-row">
        <div class="info-icon">
          <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.6 3.45 2 2 0 0 1 3.57 1.25h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.82a16 16 0 0 0 6.27 6.27l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        </div>
        <div class="info-text">
          <span class="info-label">Phone</span>
          <span class="info-val">(82) 10-3790-6635</span>
        </div>
      </div>

    </div>
  </div>

  <!-- 오른쪽: 폼 -->
  <div class="form-side">
    <div class="form-head">
      <div class="form-eyebrow">KUAC Vietnam HQ</div>
      <div class="form-title">Contact Us</div>
      <div class="form-sub">궁금하신 점이 있으시면 언제든지 문의해 주세요.</div>
    </div>

    <form id="contactForm" novalidate>
      <div class="row">
        <div class="field">
          <label for="fname">First Name <span class="req">*</span></label>
          <input type="text" id="fname" name="fname" placeholder="First name" required>
        </div>
        <div class="field">
          <label for="lname">Last Name <span class="req">*</span></label>
          <input type="text" id="lname" name="lname" placeholder="Last name" required>
        </div>
      </div>

      <div class="field">
        <label for="email">Email <span class="req">*</span></label>
        <input type="email" id="email" name="email" placeholder="your@email.com" required>
      </div>

      <div class="field">
        <label for="message">Message <span class="req">*</span></label>
        <textarea id="message" name="message" placeholder="문의 내용을 입력해 주세요..." required></textarea>
      </div>

      <div class="msg success" id="msgSuccess">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        메일이 성공적으로 전송되었습니다! 빠른 시일 내에 답변 드리겠습니다.
      </div>
      <div class="msg error" id="msgError">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        모든 항목을 올바르게 입력해 주세요.
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        <span id="btnText">Send Message</span>
        <div class="spinner" id="spinner"></div>
      </button>
    </form>
  </div>

</div>

<script>
const form = document.getElementById('contactForm');
const successMsg = document.getElementById('msgSuccess');
const errorMsg = document.getElementById('msgError');
const submitBtn = document.getElementById('submitBtn');
const btnText = document.getElementById('btnText');
const spinner = document.getElementById('spinner');

function hideMessages(){
  successMsg.style.display='none';
  errorMsg.style.display='none';
}

function validateEmail(email){
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

form.addEventListener('submit', function(e){
  e.preventDefault();
  hideMessages();

  const fname = document.getElementById('fname').value.trim();
  const lname = document.getElementById('lname').value.trim();
  const email = document.getElementById('email').value.trim();
  const message = document.getElementById('message').value.trim();

  if(!fname || !lname || !email || !message || !validateEmail(email)){
    errorMsg.style.display='flex';
    errorMsg.scrollIntoView({behavior:'smooth',block:'nearest'});
    return;
  }

  // 로딩 상태
  submitBtn.disabled=true;
  btnText.textContent='Sending...';
  spinner.style.display='block';

  // mailto 링크 생성 → 기본 메일 앱 열기
  const subject = encodeURIComponent(`[KUAC 문의] ${fname} ${lname}`);
  const body = encodeURIComponent(
    `이름(Name): ${fname} ${lname}\n이메일(Email): ${email}\n\n문의내용(Message):\n${message}\n\n---\nSent from KUAC Vietnam HQ Contact Form\nwww.Kstudy365.com`
  );
  const mailtoLink = `mailto:huh0303@gmail.com?subject=${subject}&body=${body}`;

  setTimeout(()=>{
    window.location.href = mailtoLink;

    submitBtn.disabled=false;
    btnText.textContent='Send Message';
    spinner.style.display='none';

    successMsg.style.display='flex';
    form.reset();
    successMsg.scrollIntoView({behavior:'smooth',block:'nearest'});
  }, 900);
});
</script>

</body>
</html>
